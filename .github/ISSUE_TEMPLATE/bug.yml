name: Bug report
description: Report a reproducible problem without personal practice data.
labels: [bug]
body:
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the question-pack shape only if it contains no private data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
